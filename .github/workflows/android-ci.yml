name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout source
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2️⃣ Setup Java 17
    - name: Setup JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        cache: gradle

    # 3️⃣ Cache Gradle
    - name: Cache Gradle Dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-${{ runner.os }}

    # 4️⃣ Make Gradle executable
    - name: Grant execute permission
      run: chmod +x gradlew

    # 5️⃣ Build project
    - name: Build Android Project
      run: ./gradlew build

    # 6️⃣ Run unit tests
    - name: Run Unit Tests
      run: ./gradlew test

    # 7️⃣ Run Android Lint
    - name: Run Lint
      run: ./gradlew lint

    # 8️⃣ Run Semgrep SAST scan
    - name: Run Semgrep Security Scan
      uses: returntocorp/semgrep-action@v1

    # 9️⃣ Install Snyk CLI (runs on host, fixes JAVA_HOME issue)
    - name: Install Snyk
      uses: snyk/actions/setup@v4

    # 🔟 Authenticate Snyk
    - name: Authenticate Snyk
      run: snyk auth ${{ secrets.SNYK_TOKEN }}

    # 1️⃣1️⃣ Run Snyk dependency scan
    - name: Run Snyk Test
      run: snyk test --severity-threshold=high

    # 1️⃣2️⃣ Monitor project in Snyk dashboard
    - name: Snyk Monitor
      run: snyk monitor
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
